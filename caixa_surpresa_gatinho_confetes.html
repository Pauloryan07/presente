
<style>
  #app {
    min-height: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: var(--font-sans);
    background: transparent;
    position: relative;
    overflow: hidden;
  }
  h1 {
    font-size: 2.2rem;
    font-weight: 500;
    color: var(--color-text-primary);
    margin: 0 0 2rem;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  #box-wrap {
    position: relative;
    width: 200px;
    height: 220px;
    cursor: pointer;
    user-select: none;
  }
  #box-wrap:hover .box-body { filter: brightness(1.07); }
  .box-body {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 200px;
    height: 160px;
    background: #e63b6f;
    border-radius: 0 0 14px 14px;
    transition: transform 0.15s;
  }
  #box-wrap:active .box-body { transform: scale(0.97); }
  .box-stripe {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 160px;
    background: #fff3;
    border-radius: 4px;
  }
  .box-lid {
    position: absolute;
    top: 30px;
    left: -8px;
    width: 216px;
    height: 44px;
    background: #c42050;
    border-radius: 8px;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1), opacity 0.4s;
    transform-origin: center top;
  }
  .box-lid.open {
    transform: translateY(-60px) rotate(-18deg);
    opacity: 0;
  }
  .bow { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 80px; height: 40px; transition: opacity 0.3s; }
  .bow.open { opacity: 0; }
  .bow-left, .bow-right { position: absolute; top: 0; width: 34px; height: 34px; border-radius: 50%; background: #ffd700; border: 4px solid #c9a800; }
  .bow-left { left: 0; }
  .bow-right { right: 0; }
  .bow-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 14px; height: 14px; border-radius: 50%; background: #ffd700; border: 3px solid #c9a800; z-index: 2; }
  #progress-bar { margin-top: 1.5rem; width: 200px; height: 8px; background: var(--color-background-secondary); border-radius: 99px; overflow: hidden; border: 0.5px solid var(--color-border-tertiary); }
  #progress-fill { height: 100%; width: 0%; background: #e63b6f; border-radius: 99px; transition: width 0.3s cubic-bezier(.4,0,.2,1); }
  #click-count { margin-top: 0.6rem; font-size: 13px; color: var(--color-text-secondary); }
  #cat-reveal { display: none; flex-direction: column; align-items: center; animation: popIn 0.5s cubic-bezier(.4,0,.2,1); }
  @keyframes popIn {
    0% { transform: scale(0.5) translateY(30px); opacity: 0; }
    70% { transform: scale(1.1) translateY(-8px); opacity: 1; }
    100% { transform: scale(1) translateY(0); }
  }
  #love-text { font-size: 2rem; font-weight: 500; color: #e63b6f; margin-top: 1rem; animation: heartbeat 0.9s ease-in-out infinite; }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    30% { transform: scale(1.12); }
    60% { transform: scale(0.97); }
  }
  .heart-fly { position: absolute; pointer-events: none; font-size: 1.4rem; }
  canvas#confetti-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }
</style>

<div id="app">
  <canvas id="confetti-canvas"></canvas>
  <h1>Click me!</h1>

  <div id="box-wrap" onclick="handleClick()">
    <div class="bow" id="bow">
      <div class="bow-left"></div>
      <div class="bow-right"></div>
      <div class="bow-center"></div>
    </div>
    <div class="box-lid" id="lid"></div>
    <div class="box-body"><div class="box-stripe"></div></div>
  </div>

  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="click-count">0 / 10 cliques</div>

  <div id="cat-reveal">
    <svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="80" cy="118" rx="44" ry="36" fill="#f5f5f0" stroke="#ddd" stroke-width="1"/>
      <ellipse cx="80" cy="72" rx="38" ry="36" fill="#f5f5f0" stroke="#ddd" stroke-width="1"/>
      <polygon points="44,50 36,22 62,42" fill="#f5f5f0" stroke="#ddd" stroke-width="1"/>
      <polygon points="46,47 40,28 60,43" fill="#ffcccc"/>
      <polygon points="116,50 124,22 98,42" fill="#f5f5f0" stroke="#ddd" stroke-width="1"/>
      <polygon points="114,47 120,28 100,43" fill="#ffcccc"/>
      <ellipse cx="64" cy="70" rx="7" ry="8" fill="#2a2a2a"/>
      <ellipse cx="96" cy="70" rx="7" ry="8" fill="#2a2a2a"/>
      <circle cx="66" cy="67" r="2.5" fill="white"/>
      <circle cx="98" cy="67" r="2.5" fill="white"/>
      <polygon points="80,82 76,87 84,87" fill="#ffb3b3"/>
      <path d="M76,88 Q80,93 84,88" fill="none" stroke="#ddd" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="45" y1="82" x2="72" y2="84" stroke="#bbb" stroke-width="1" stroke-linecap="round"/>
      <line x1="45" y1="87" x2="72" y2="86" stroke="#bbb" stroke-width="1" stroke-linecap="round"/>
      <line x1="115" y1="82" x2="88" y2="84" stroke="#bbb" stroke-width="1" stroke-linecap="round"/>
      <line x1="115" y1="87" x2="88" y2="86" stroke="#bbb" stroke-width="1" stroke-linecap="round"/>
      <path d="M124,130 Q150,100 130,80" fill="none" stroke="#e8e8e0" stroke-width="10" stroke-linecap="round"/>
      <ellipse cx="58" cy="148" rx="14" ry="9" fill="#f5f5f0" stroke="#ddd" stroke-width="1"/>
      <ellipse cx="102" cy="148" rx="14" ry="9" fill="#f5f5f0" stroke="#ddd" stroke-width="1"/>
    </svg>
    <div id="love-text">Te amo isabely ❤️</div>
  </div>
</div>

<script>
  let clicks = 0;
  const max = 10;
  let opened = false;

  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  let pieces = [];
  let animating = false;

  const COLORS = ['#e63b6f','#ffd700','#4fc3f7','#81c784','#ff8a65','#ce93d8','#f06292','#fff176'];

  function resizeCanvas() {
    const app = document.getElementById('app');
    canvas.width = app.offsetWidth;
    canvas.height = app.offsetHeight;
  }

  function createConfetti() {
    resizeCanvas();
    pieces = [];
    for (let i = 0; i < 160; i++) {
      pieces.push({
        x: Math.random() * canvas.width,
        y: -10 - Math.random() * 200,
        w: 7 + Math.random() * 7,
        h: 5 + Math.random() * 5,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.18,
        vx: (Math.random() - 0.5) * 3.5,
        vy: 2.5 + Math.random() * 3.5,
        shape: Math.random() > 0.5 ? 'rect' : 'circle',
        alpha: 1
      });
    }
  }

  function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let any = false;
    for (const p of pieces) {
      if (p.y > canvas.height + 20) continue;
      any = true;
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.rotSpeed;
      p.vy += 0.07;
      if (p.y > canvas.height - 60) p.alpha -= 0.025;
    }
    if (any && animating) requestAnimationFrame(drawConfetti);
    else { animating = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }

  function launchConfetti() {
    createConfetti();
    animating = true;
    requestAnimationFrame(drawConfetti);
  }

  function handleClick() {
    if (opened) return;
    clicks++;
    document.getElementById('progress-fill').style.width = (clicks / max * 100) + '%';
    document.getElementById('click-count').textContent = clicks + ' / ' + max + ' cliques';
    spawnHeart();
    if (clicks === 5) {
      document.getElementById('lid').style.transform = 'translateY(-20px) rotate(-6deg)';
    }
    if (clicks >= max) openBox();
  }

  function openBox() {
    opened = true;
    document.getElementById('lid').classList.add('open');
    document.getElementById('bow').classList.add('open');
    document.getElementById('progress-bar').style.display = 'none';
    document.getElementById('click-count').style.display = 'none';

    setTimeout(() => {
      document.getElementById('box-wrap').style.display = 'none';
      const reveal = document.getElementById('cat-reveal');
      reveal.style.display = 'flex';
      launchConfetti();
      for (let i = 0; i < 8; i++) setTimeout(spawnHeart, i * 120);
    }, 600);
  }

  function spawnHeart() {
    const app = document.getElementById('app');
    const h = document.createElement('div');
    h.className = 'heart-fly';
    h.textContent = ['❤️','💕','💗','💖'][Math.floor(Math.random() * 4)];
    h.style.left = (20 + Math.random() * 60) + '%';
    h.style.top = (20 + Math.random() * 50) + '%';
    h.style.zIndex = 20;
    h.style.transition = 'transform 1.2s ease-out, opacity 1.2s ease-out';
    h.style.opacity = '1';
    app.appendChild(h);
    requestAnimationFrame(() => {
      h.style.transform = 'translateY(-70px) scale(1.4)';
      h.style.opacity = '0';
    });
    setTimeout(() => h.remove(), 1300);
  }
</script>
